name: ProPDF
options:
  bundleIdPrefix: com.propdf
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_STRICT_OBJC_MSGSEND: YES

targets:
  ProPDF:
    type: application
    platform: macOS
    sources:
      - path: ProPDF
        excludes:
          - "**/*.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.propdf.ProPDF
        PRODUCT_NAME: ProPDF
        INFOPLIST_FILE: ProPDF/App/Info.plist
        CODE_SIGN_ENTITLEMENTS: ProPDF/ProPDF.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_IDENTITY: "-"
        SWIFT_STRICT_CONCURRENCY: minimal
    info:
      path: ProPDF/App/Info.plist
      properties:
        CFBundleName: ProPDF
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSPrincipalClass: NSApplication
        NSSupportsAutomaticTermination: true
        NSSupportsSuddenTermination: true
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "Copyright © 2024. All rights reserved."
        CFBundleDocumentTypes:
          - CFBundleTypeName: "PDF Document"
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - com.adobe.pdf
            NSDocumentClass: ProPDF.ProPDFDocument
